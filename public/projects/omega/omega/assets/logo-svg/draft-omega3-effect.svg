<svg width="300" height="300" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0" />
      <stop offset="50%" stop-color="white" stop-opacity="0.6" /> <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>

    <clipPath id="circleClip">
       <circle cx="512" cy="512" r="125.6727273" />
    </clipPath>
  </defs>

  <circle cx="512" cy="512" r="125.6727273" fill="#ED1C24" stroke="none"/>
  
  <rect x="0" y="0" width="1024" height="1024" fill="url(#shineGradient)" clip-path="url(#circleClip)" opacity="0.8">
    <animateTransform attributeName="transform" type="translate" from="-600 0" to="600 0" dur="2.5s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="skewX" values="-20" additive="sum" /> 
  </rect>


  </svg>