<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>OMEGA ERP – Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:transparent; overflow:hidden; }
  /* Center-crop: 16:9 canvas centered in any viewport (square iframe = center-cropped) */
  canvas {
    position: fixed;
    width:  177.78vh;
    height: 100vh;
    left: 50%; top: 0;
    transform: translateX(-50%);
    display: block;
    background: transparent;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
!function() {
'use strict';
const W=1920, H=1080;
const cv=document.getElementById('c');
cv.width=W; cv.height=H;
const ctx=cv.getContext('2d');

/* ── Utilities ── */
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const prog=(n,s,e)=>clamp((n-s)/(e-s),0,1);
const eO=t=>1-(1-t)**3;
const eI=t=>t**3;
const eB=t=>t<.5?4*t**3:1-((-2*t+2)**3)/2;
const eO4=t=>1-(1-t)**4;

function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}
function glow(x,y,r,hex,a){
  if(a<=0)return;
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,rgba(hex,a)); g.addColorStop(1,rgba(hex,0));
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
}
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}
function sceneA(now,s,e,fi=700,fo=700){
  return clamp(Math.min(prog(now,s,s+fi), 1-prog(now,e-fo,e)),0,1);
}
/* Auto-size font to fit within maxW px, returns font size */
function fitFont(weight,maxPx,family,text,maxW){
  let size=maxPx;
  ctx.font=`${weight} ${size}px ${family}`;
  const w=ctx.measureText(text).width;
  if(w>maxW) size=Math.floor(size*maxW/w);
  return size;
}
const VNF="'Be Vietnam Pro',sans-serif";

/* ── Brand colours ── */
const G='#00A651',R='#ED1C24',BG='#000810';
const BLUE='#2196F3',TEAL='#00BCD4',ORG='#FF9800',PURP='#9C27B0';

/* ── Timeline (ms) ── */
const TL={
  s1s:0,    s1e:3000,
  s2s:2500, s2e:7800,
  s3s:7200, s3e:13000,
  s4s:12400,s4e:20000,
  s5s:19400,s5e:24500,
  s6s:24000,s6e:35000,
  fo:33000, end:35500,
};

/* ── OMEGA logo image (S6 finale) ── */
const logoImg=new Image();
logoImg.src='assets/images/omega-4B-rect-trans-full.png';
let logoReady=false;
logoImg.onload=()=>{ logoReady=true; };

/* ── OMEGA product logo (S4 center) ── */
const prodLogoImg=new Image();
prodLogoImg.src='assets/images/omega-3C-square-trans-product-opt.svg';
let prodLogoReady=false;
prodLogoImg.onload=()=>{ prodLogoReady=true; };

/* ── OMEGA 1-color icon (S6 decorator) ── */
const iconImg=new Image();
iconImg.src='assets/images/omega-1C-transparent.svg';
let iconReady=false;
iconImg.onload=()=>{ iconReady=true; };

/* ── Background dust ── */
const dust=Array.from({length:130},()=>({
  x:Math.random()*W, y:Math.random()*H,
  vx:(Math.random()-.5)*.18, vy:(Math.random()-.5)*.18,
  r:.3+Math.random()*.9, a:.10+Math.random()*.28,
}));

/* Scene transition scan-sweep state */
const sweeps=[];
function triggerSweep(){ sweeps.push({t:performance.now(), dir:Math.random()>.5?1:-1}); }
const SWEEP_TMS=[TL.s2s,TL.s3s,TL.s4s,TL.s5s,TL.s6s];
let prevNow=-1;

function drawBG(now){
  ctx.clearRect(0,0,W,H);

  /* scanlines over hero background */
  for(let y=0;y<H;y+=4){ ctx.fillStyle='rgba(0,0,0,0.06)'; ctx.fillRect(0,y,W,1); }

  /* check scene-transition triggers */
  SWEEP_TMS.forEach(ts=>{ if(prevNow<ts&&now>=ts) triggerSweep(); });
  prevNow=now;

  /* subtle grid */
  const gp=Math.min(1,now/1400);
  if(gp>0){
    ctx.save(); ctx.globalAlpha=gp*.22; ctx.strokeStyle=rgba(G,1); ctx.lineWidth=.35;
    for(let i=0;i<22;i++){ const y=H*(i/21); ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
    for(let i=0;i<34;i++){ const x=W*(i/33); ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    ctx.restore();
  }

  /* dust particles */
  dust.forEach(d=>{
    d.x=(d.x+d.vx+W)%W; d.y=(d.y+d.vy+H)%H;
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,166,81,${d.a})`; ctx.fill();
  });

  /* dramatic scan-sweep flares at scene transitions */
  const nowMs=performance.now();
  for(let i=sweeps.length-1;i>=0;i--){
    const age=(nowMs-sweeps[i].t)/1000;
    if(age>1.2){ sweeps.splice(i,1); continue; }
    const sy=sweeps[i].dir>0? age/1.2*H : H-(age/1.2*H);
    const fade=1-age/1.2;
    const sg=ctx.createLinearGradient(0,sy-80,0,sy+80);
    sg.addColorStop(0,'transparent');
    sg.addColorStop(.45,`rgba(0,166,81,${(fade*.32).toFixed(3)})`);
    sg.addColorStop(.5,`rgba(255,255,255,${(fade*.55).toFixed(3)})`);
    sg.addColorStop(.55,`rgba(0,166,81,${(fade*.32).toFixed(3)})`);
    sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg; ctx.fillRect(0,sy-80,W,160);
  }

  /* vignette – dark edges draw eye to center */
  const vg=ctx.createRadialGradient(W/2,H/2,H*.28, W/2,H/2,W*.72);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(.7,'rgba(0,0,0,0.25)');
  vg.addColorStop(1,'rgba(0,0,0,0.72)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
}

/* ── S1: Opening ── */
function drawS1(now){
  const sa=sceneA(now,TL.s1s,TL.s1e,800,600); if(sa<=0)return;
  ctx.save(); ctx.globalAlpha=sa;
  /* corner marks */
  ctx.strokeStyle=rgba(G,.75); ctx.lineWidth=1.5;
  [[60,60],[W-60,60],[60,H-60],[W-60,H-60]].forEach(([cx,cy],i)=>{
    const sx=i%2===0?1:-1,sy=i<2?1:-1;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+sx*70,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx,cy+sy*70); ctx.stroke();
  });
  const tp=eO(prog(now,TL.s1s+400,TL.s1s+1300));
  if(tp>0){
    ctx.globalAlpha=sa*tp;
    glow(W/2,H/2,340,G,.14*tp);
    ctx.font='600 22px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle=rgba(G,.95);
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.letterSpacing='8px';
    ctx.fillText('CÔNG TY TNHH CÔNG NGHỆ VÀ GIẢI PHÁP OMEGA',W/2,H/2-96);
    ctx.letterSpacing='0px';
    ctx.shadowColor=G; ctx.shadowBlur=28*tp;
    const tagTxt='Đồng hành · Chuyển đổi · Tăng trưởng';
    const tagSz=fitFont('bold 800',72,VNF,tagTxt,W*.88);
    ctx.font=`bold 800 ${tagSz}px ${VNF}`; ctx.fillStyle='#FFFFFF';
    ctx.fillText(tagTxt,W/2,H/2+6);
    ctx.shadowBlur=0;
    const subTxt='ERP Việt Nam – Giải pháp quản trị doanh nghiệp toàn diện';
    const subSz=fitFont('600',26,VNF,subTxt,W*.80);
    ctx.font=`600 ${subSz}px ${VNF}`; ctx.fillStyle=rgba(G,.9);
    ctx.fillText(subTxt,W/2,H/2+72);
  }
  ctx.restore();
}

/* ── S2: Stats ── */
const STATS=[
  {v:'16+',   lbl:'Năm kinh nghiệm',      col:G},
  {v:'1.000+',lbl:'Doanh nghiệp tin dùng',col:R},
  {v:'20+',   lbl:'Ngành nghề phục vụ',   col:TEAL},
  {v:'18',    lbl:'Phân hệ phần mềm ERP', col:ORG},
];
function drawS2(now){
  const sa=sceneA(now,TL.s2s,TL.s2e,700,700); if(sa<=0)return;
  ctx.save(); ctx.globalAlpha=sa;
  const hp=eO(prog(now,TL.s2s,TL.s2s+800));
  ctx.globalAlpha=sa*hp;
  ctx.font='700 24px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle=rgba(G,.95);
  ctx.textAlign='center'; ctx.letterSpacing='7px';
  ctx.fillText('SỨC MẠNH OMEGA',W/2,H/2-290);
  ctx.letterSpacing='0px'; ctx.globalAlpha=sa;
  const bw=370,bh=210,gX=70,gY=58;
  const sx=W/2-(2*bw+gX)/2+bw/2, sy=H/2-(bh+gY)/2+bh/2-18;
  STATS.forEach((s,i)=>{
    const d=i*.18, p=eO(clamp((prog(now,TL.s2s,TL.s2e)-d)/.5,0,1));
    if(p<=0)return;
    const col=i%2, row=Math.floor(i/2);
    const px=sx+col*(bw+gX), py=sy+row*(bh+gY);
    ctx.save(); ctx.globalAlpha=sa*p; ctx.translate(0,lerp(-55,0,p));
    ctx.shadowColor=s.col; ctx.shadowBlur=18*p;
    rr(px-bw/2,py-bh/2,bw,bh,14);
    ctx.fillStyle=rgba(s.col,.18); ctx.fill();
    ctx.strokeStyle=rgba(s.col,.85); ctx.lineWidth=1.5; ctx.stroke();
    ctx.shadowBlur=26; ctx.font='bold 86px \'Be Vietnam Pro\',sans-serif';
    ctx.fillStyle=s.col; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(s.v,px,py-24);
    ctx.shadowBlur=0; ctx.font='25px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle='#BDD8F0';
    ctx.fillText(s.lbl,px,py+50);
    ctx.restore();
  });
  ctx.restore();
}

/* ── S3: Industries ── */
const INDS=[
  {name:'Nhựa & Hoá chất',         sub:'Sản xuất · Tồn kho · Giá thành',  col:TEAL},
  {name:'Gỗ & Nội thất',            sub:'Định mức · Sản xuất · CL',        col:ORG},
  {name:'F&B – Thực phẩm',          sub:'Sản xuất · Truy xuất · CRM',      col:G},
  {name:'FMCG – Hàng tiêu dùng',    sub:'Phân phối · Kênh bán · DMS',      col:BLUE},
  {name:'Thủy – Hải sản',            sub:'Nguyên liệu · Chế biến · XK',    col:TEAL},
  {name:'Thiết bị Y tế & Dược phẩm',sub:'Lô-date · Kiểm soát · Nhập khẩu',col:R},
];
function drawS3(now){
  const sa=sceneA(now,TL.s3s,TL.s3e,700,700); if(sa<=0)return;
  ctx.save(); ctx.globalAlpha=sa;
  const hp=eO(prog(now,TL.s3s,TL.s3s+800));
  ctx.save(); ctx.globalAlpha=sa*hp;
  ctx.font='700 24px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle=rgba(G,.95);
  ctx.textAlign='center'; ctx.letterSpacing='7px';
  ctx.fillText('GIẢI PHÁP THEO NGÀNH NGHỀ',W/2,H/2-304);
  ctx.letterSpacing='0px';
  ctx.font='26px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle='rgba(255,255,255,.82)';
  ctx.fillText('ERP tùy biến – đúng ngành – đúng quy trình',W/2,H/2-260);
  ctx.restore();
  /* 3×2 narrower cards */
  const cw=310,ch=138,gX=28,gY=28;
  const totalW=3*cw+2*gX, totalH=2*ch+gY;
  const sx=W/2-totalW/2, sy=H/2-totalH/2+14;
  INDS.forEach((ind,i)=>{
    const col=i%3, row=Math.floor(i/3);
    const px=sx+col*(cw+gX), py=sy+row*(ch+gY);
    const d=i*.12, p=eO(clamp((prog(now,TL.s3s+400,TL.s3e)-d)/.42,0,1));
    if(p<=0)return;
    const fromX=col===0?px-200:col===2?px+200:px;
    const rx=lerp(fromX,px,p);
    ctx.save(); ctx.globalAlpha=sa*p;
    ctx.shadowColor=ind.col; ctx.shadowBlur=12*p;
    rr(rx,py,cw,ch,12);
    ctx.fillStyle=rgba(ind.col,.18); ctx.fill();
    ctx.strokeStyle=rgba(ind.col,.80); ctx.lineWidth=1.5; ctx.stroke();
    rr(rx,py,5,ch,3); ctx.fillStyle=ind.col; ctx.shadowBlur=0; ctx.fill();
    ctx.font='bold 22px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle='#FFFFFF';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.shadowColor=ind.col; ctx.shadowBlur=8;
    ctx.fillText(ind.name,rx+22,py+44);
    ctx.shadowBlur=0; ctx.font='15px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle=rgba(ind.col,.95);
    ctx.fillText(ind.sub,rx+22,py+86);
    ctx.restore();
  });
  ctx.restore();
}

/* ── S4: Products ── */
const PGROUPS=[
  {lbl:'Tài chính – Kế toán',angle:-Math.PI/2,dist:210,yd:145,col:TEAL,
   mods:['OMEGA.GL','OMEGA.FA','OMEGA.PC','OMEGA.MC','OMEGA.CL']},
  {lbl:'Kho & Cung ứng',     angle:0,         dist:270,yd:0,  col:BLUE,
   mods:['OMEGA.WM','OMEGA.PO','OMEGA.SO']},
  {lbl:'Nhân sự & Sản xuất', angle:Math.PI/2, dist:210,yd:145,col:ORG,
   mods:['OMEGA.HR','OMEGA.PR','OMEGA.MM','OMEGA.QC']},
  {lbl:'Sản phẩm độc lập',   angle:Math.PI,   dist:270,yd:0,  col:PURP,
   mods:['GAMA.SMB','OMEGA.EDU','OMEGA.CRM']},
];
const MOBILE=['OMEGA.APV','OMEGA.SCR','OMEGA.STK','OMEGA.SOR','OMEGA.MST','OMEGA.HRM'];

function drawS4(now){
  const sa=sceneA(now,TL.s4s,TL.s4e,700,700); if(sa<=0)return;
  const op=prog(now,TL.s4s,TL.s4e);
  ctx.save(); ctx.globalAlpha=sa;
  const hp=eO(prog(now,TL.s4s,TL.s4s+700));
  if(hp>0){
    ctx.save(); ctx.globalAlpha=sa*hp;
    ctx.font='700 24px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle=rgba(G,.95);
    ctx.textAlign='center'; ctx.letterSpacing='7px';
    ctx.fillText('HỆ SINH THÁI SẢN PHẨM',W/2,92);
    ctx.letterSpacing='0px'; ctx.restore();
  }
  const cx=W/2, cy=H/2-10;
  const coreP=eO(prog(now,TL.s4s,TL.s4s+600));

  /* ── Pass 1: dashed lines from center to groups (below logo) ── */
  if(coreP>0) glow(cx,cy,180,G,.14*coreP);
  PGROUPS.forEach((grp,gi)=>{
    const gd=.08+gi*.14, gp=eO(clamp((op-gd)/.3,0,1)); if(gp<=0)return;
    const gx=cx+Math.cos(grp.angle)*grp.dist*gp;
    const gy=cy+(grp.angle===0||grp.angle===Math.PI?0:Math.sign(Math.sin(grp.angle))*grp.yd)*gp;
    ctx.save(); ctx.globalAlpha=sa*gp*.6;
    ctx.strokeStyle=rgba(grp.col,.55); ctx.lineWidth=1.5; ctx.setLineDash([5,8]);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(gx,gy); ctx.stroke();
    ctx.setLineDash([]); ctx.restore();
  });

  /* ── Logo at center (above lines) ── */
  if(coreP>0){
    glow(cx,cy,88,G,.22*coreP);
    ctx.save(); ctx.globalAlpha=sa*coreP;
    if(prodLogoReady){
      const ps=140;
      ctx.shadowColor=G; ctx.shadowBlur=28*coreP;
      ctx.drawImage(prodLogoImg,cx-ps/2,cy-ps/2,ps,ps);
      ctx.shadowBlur=0;
    } else {
      ctx.shadowColor=G; ctx.shadowBlur=34;
      ctx.font='bold 80px Georgia,serif'; ctx.fillStyle=G;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('Ω',cx,cy); ctx.shadowBlur=0;
    }
    ctx.restore();
  }

  /* ── Pass 2: group nodes, labels, module nodes (above logo) ── */
  PGROUPS.forEach((grp,gi)=>{
    const gd=.08+gi*.14, gp=eO(clamp((op-gd)/.3,0,1)); if(gp<=0)return;
    const gx=cx+Math.cos(grp.angle)*grp.dist*gp;
    const gy=cy+(grp.angle===0||grp.angle===Math.PI?0:Math.sign(Math.sin(grp.angle))*grp.yd)*gp;
    ctx.save(); ctx.globalAlpha=sa*gp;
    ctx.beginPath(); ctx.arc(gx,gy,18,0,Math.PI*2);
    ctx.fillStyle=grp.col; ctx.shadowColor=grp.col; ctx.shadowBlur=20; ctx.fill();
    ctx.shadowBlur=0;
    const lxO=grp.angle===0?130:grp.angle===Math.PI?-130:0;
    const lyO=grp.angle===-Math.PI/2?-36:grp.angle===Math.PI/2?36:0;
    ctx.font='bold 18px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle=grp.col;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(grp.lbl,gx+lxO,gy+lyO);
    const n=grp.mods.length;
    grp.mods.forEach((mod,mi)=>{
      const md=gd+.22+mi*.07, mp=eO(clamp((op-md)/.25,0,1)); if(mp<=0)return;
      const fanBase=grp.angle+(Math.PI*.5);
      const fanA=fanBase-(n-1)*.22+mi*.44;
      const mx=gx+Math.cos(fanA)*138*mp, my=gy+Math.sin(fanA)*90*mp;
      ctx.save(); ctx.globalAlpha=sa*mp;
      ctx.strokeStyle=rgba(grp.col,.35); ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(gx,gy); ctx.lineTo(mx,my); ctx.stroke();
      ctx.beginPath(); ctx.arc(mx,my,5.5,0,Math.PI*2);
      ctx.fillStyle=rgba(grp.col,.9); ctx.shadowColor=grp.col; ctx.shadowBlur=10; ctx.fill();
      ctx.shadowBlur=0; ctx.font='bold 12.5px monospace'; ctx.fillStyle='#E0F4FF';
      ctx.textAlign='center'; ctx.textBaseline='bottom';
      ctx.fillText(mod,mx,my-10); ctx.restore();
    });
    ctx.restore();
  });
  const mp=eO(prog(now,TL.s4s+3500,TL.s4s+4500));
  if(mp>0){
    const ay=H-95;
    ctx.save(); ctx.globalAlpha=sa*mp;
    ctx.font='700 16px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle=rgba(G,.6);
    ctx.textAlign='center';
    ctx.fillText('📱  Mobile App  –  iOS & Android',W/2,ay-42);
    MOBILE.forEach((app,i)=>{
      const lp=eO(clamp((mp-i*.12)/.5,0,1)); if(lp<=0)return;
      const ax=W/2+(i-2.5)*190, ay2=ay+8;
      ctx.save(); ctx.globalAlpha=sa*lp;
      rr(ax-72,ay2-23,144,46,23);
      ctx.fillStyle=rgba(G,.1); ctx.fill();
      ctx.strokeStyle=rgba(G,.4); ctx.lineWidth=1; ctx.stroke();
      ctx.font='bold 13.5px monospace'; ctx.fillStyle='#7DDDBB';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(app,ax,ay2); ctx.restore();
    });
    ctx.restore();
  }
  ctx.restore();
}

/* ── S5: Services ── */
const SVCS=[
  {n:'01',t:'Tư vấn & Triển khai ERP',col:G,
   pts:['Phân tích nghiệp vụ chuyên sâu','Thiết kế giải pháp ERP phù hợp','Triển khai phương pháp Agile','Kiểm thử UAT · Go-live']},
  {n:'02',t:'Đào tạo & Chuyển giao',col:TEAL,
   pts:['Đào tạo người dùng thực tiễn','Tài liệu hướng dẫn đầy đủ','Chuyển giao công nghệ hoàn toàn','Workshop & e-learning']},
  {n:'03',t:'Bảo trì & Hỗ trợ dài hạn',col:R,
   pts:['Hotline hỗ trợ kỹ thuật','Bảo trì & nâng cấp hệ thống','Giám sát hiệu năng liên tục','Đồng hành toàn bộ vòng đời']},
];
function drawS5(now){
  const sa=sceneA(now,TL.s5s,TL.s5e,700,700); if(sa<=0)return;
  ctx.save(); ctx.globalAlpha=sa;
  const hp=eO(prog(now,TL.s5s,TL.s5s+800));
  ctx.save(); ctx.globalAlpha=sa*hp;
  ctx.font='700 24px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle=rgba(G,.95);
  ctx.textAlign='center'; ctx.letterSpacing='7px';
  ctx.fillText('DỊCH VỤ TOÀN VÒNG ĐỜI',W/2,H/2-298);
  ctx.letterSpacing='0px';
  ctx.font='24px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle='rgba(255,255,255,.82)';
  ctx.fillText('Từ tư vấn · triển khai · đào tạo đến bảo trì – Omega đồng hành cùng bạn',W/2,H/2-254);
  ctx.restore();
  const bw=310,bh=300,gap=34;
  const totalW=3*bw+2*gap, sx=W/2-totalW/2, cy=H/2+38;
  SVCS.forEach((s,i)=>{
    const px=sx+i*(bw+gap);
    const d=i*.18, p=eO(clamp((prog(now,TL.s5s+300,TL.s5e)-d)/.42,0,1));
    if(p<=0)return;
    const ry=lerp(H+100,cy,p);
    ctx.save(); ctx.globalAlpha=sa*p;
    ctx.shadowColor=s.col; ctx.shadowBlur=20*p;
    rr(px,ry-bh/2,bw,bh,14); ctx.fillStyle=rgba(s.col,.18); ctx.fill();
    ctx.strokeStyle=rgba(s.col,.85); ctx.lineWidth=1.5; ctx.stroke();
    rr(px,ry-bh/2,bw,5,2); ctx.fillStyle=s.col; ctx.shadowBlur=0; ctx.fill();
    ctx.font='bold 52px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle=rgba(s.col,.18);
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText(s.n,px+bw/2,ry-bh/2+14);
    ctx.shadowColor=s.col; ctx.shadowBlur=12;
    ctx.font='bold 24px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle='#FFFFFF';
    ctx.textBaseline='middle'; ctx.fillText(s.t,px+bw/2,ry-46);
    ctx.shadowBlur=0;
    ctx.strokeStyle=rgba(s.col,.32); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px+24,ry-12); ctx.lineTo(px+bw-24,ry-12); ctx.stroke();
    ctx.font='16px \'Be Vietnam Pro\',sans-serif'; ctx.textAlign='left';
    s.pts.forEach((pt,pi)=>{
      ctx.fillStyle=rgba(s.col,.8); ctx.fillText('▸',px+20,ry+16+pi*36);
      ctx.fillStyle='#C8E6FF'; ctx.fillText(pt,px+40,ry+16+pi*36);
    });
    ctx.restore();
  });
  const ap=eO(prog(now,TL.s5s+1200,TL.s5e-300));
  if(ap>0){
    [0,1].forEach(i=>{
      const ax=sx+(i+1)*(bw+gap)-gap/2, ay=cy+bh/2+40;
      ctx.save(); ctx.globalAlpha=sa*ap*.6;
      ctx.strokeStyle=rgba(G,.6); ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(ax-16,ay); ctx.lineTo(ax+16,ay); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ax+8,ay-8); ctx.lineTo(ax+16,ay); ctx.lineTo(ax+8,ay+8);
      ctx.stroke(); ctx.restore();
    });
  }
  ctx.restore();
}

/* ── S6: Logo Finale ── */
const TA={
  glow:  TL.s6s+0,
  rev0:  TL.s6s+700,    /* logo reveal start */
  rev1:  TL.s6s+2900,   /* logo fully revealed */
  fl0:   TL.s6s+2900,   /* flash start */
  fl1:   TL.s6s+3600,   /* flash end */
  tag:   TL.s6s+4000,   /* tagline */
  web:   TL.s6s+5400,   /* website */
};
let flashDone=false;

function drawS6(now){
  const sa=sceneA(now,TL.s6s,TL.s6e,800,2000); if(sa<=0)return;

  /* section label */
  const hp=eO(prog(now,TL.s6s,TL.s6s+700));
  if(hp>0){
    ctx.save(); ctx.globalAlpha=sa*hp*.55;
    ctx.font='700 22px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle=rgba(G,.90);
    ctx.textAlign='center'; ctx.letterSpacing='8px';
    ctx.fillText('THƯƠNG HIỆU OMEGA',W/2,88);
    ctx.letterSpacing='0px'; ctx.restore();
  }

  const cy=H/2-30;

  /* atmospheric glow builds before reveal */
  const glowP=eO(prog(now,TA.glow,TA.rev0+800));
  if(glowP>0){
    glow(W/2,cy,360,G,glowP*.14*sa);
    glow(W/2,cy,180,G,glowP*.10*sa);
  }

  /* ── Logo reveal (top-to-bottom scan wipe) ── */
  const revP=prog(now,TA.rev0,TA.rev1);
  if(revP>0){
    const lw=logoReady? Math.min(840, logoImg.naturalWidth||840) : 840;
    const lh=logoReady? lw*(logoImg.naturalHeight/logoImg.naturalWidth) : 210;
    const lx=W/2-lw/2, ly=cy-lh/2;
    const clipH=lh*eO4(revP);

    ctx.save();
    ctx.globalAlpha=sa;

    /* clipped image */
    ctx.save();
    ctx.beginPath(); ctx.rect(lx-2,ly,lw+4,clipH+1); ctx.clip();
    if(logoReady){
      ctx.drawImage(logoImg,lx,ly,lw,lh);
    } else {
      /* fallback: text if image not loaded */
      ctx.font='bold 110px Georgia,serif'; ctx.fillStyle=G;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.shadowColor=G; ctx.shadowBlur=40;
      ctx.fillText('Ω',W/2,cy);
    }
    ctx.restore();

    /* scan line at leading edge */
    if(revP<0.98){
      const scanY=ly+clipH;
      const sg=ctx.createLinearGradient(0,scanY-70,0,scanY+8);
      sg.addColorStop(0,'rgba(0,200,80,0)');
      sg.addColorStop(.78,rgba(G,.42));
      sg.addColorStop(1,'rgba(255,255,255,.88)');
      ctx.fillStyle=sg; ctx.fillRect(lx-20,scanY-70,lw+40,78);
    }

    /* glow around logo after reveal */
    if(revP>.5){
      const gp2=eO((revP-.5)/.5);
      glow(W/2,cy,lw*.55,G,gp2*.16*sa);
    }

    ctx.restore();
  }

  /* ── Flash at completion ── */
  const flashP=prog(now,TA.fl0,TA.fl1);
  if(flashP>0&&flashP<1){
    const fi=Math.sin(flashP*Math.PI);
    ctx.fillStyle=`rgba(255,255,255,${(fi*.20).toFixed(3)})`; ctx.fillRect(0,0,W,H);
    glow(W/2,cy,700,G,fi*.30*sa);
    glow(W/2,cy,280,'#ffffff',fi*.20*sa);
    if(!flashDone&&fi>.70){flashDone=true;}
  }

  /* ── Breathing glow on hold ── */
  if(now>TA.fl1){
    const lw=logoReady? Math.min(840,logoImg.naturalWidth||840): 840;
    const bp=.5+Math.sin(now*.0018)*.5;
    glow(W/2,cy,lw*.6,G,(.06+bp*.08)*sa);
  }

  /* ── Tagline ── */
  const tagP=eO(prog(now,TA.tag,TA.web-200));
  if(tagP>0){
    ctx.save(); ctx.globalAlpha=tagP*sa;
    const ty=cy+(logoReady? (Math.min(840,logoImg.naturalWidth||840)*(logoImg.naturalHeight/logoImg.naturalWidth))/2 : 105)+44;
    ctx.font='30px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle='#D0E8FF';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.shadowColor=rgba(G,.35); ctx.shadowBlur=8;
    ctx.fillText('Đối tác chiến lược chuyển đổi số hàng đầu Việt Nam',W/2,ty);
    ctx.restore();
  }

  /* ── Website ── */
  const webP=eO(prog(now,TA.web,TA.web+1200));
  if(webP>0){
    const lh2=logoReady?(Math.min(840,logoImg.naturalWidth||840)*(logoImg.naturalHeight/logoImg.naturalWidth)):210;
    const baseY=cy+lh2/2+48;
    ctx.save(); ctx.globalAlpha=webP*sa;
    /* ── decorator: ─────  Ω  ───── */
    const dy=baseY+82, cx2=W/2, lineLen=110, omgR=10;
    const grad1=ctx.createLinearGradient(cx2-lineLen-omgR-8,0,cx2-omgR-8,0);
    grad1.addColorStop(0,'rgba(0,166,81,0)'); grad1.addColorStop(1,rgba(G,.9));
    ctx.strokeStyle=grad1; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(cx2-lineLen-omgR-8,dy); ctx.lineTo(cx2-omgR-8,dy); ctx.stroke();
    const grad2=ctx.createLinearGradient(cx2+omgR+8,0,cx2+lineLen+omgR+8,0);
    grad2.addColorStop(0,rgba(G,.9)); grad2.addColorStop(1,'rgba(0,166,81,0)');
    ctx.strokeStyle=grad2;
    ctx.beginPath(); ctx.moveTo(cx2+omgR+8,dy); ctx.lineTo(cx2+lineLen+omgR+8,dy); ctx.stroke();
    ctx.shadowColor=G; ctx.shadowBlur=12*webP;
    if(iconReady){
      ctx.drawImage(iconImg,cx2-omgR,dy-omgR,omgR*2,omgR*2);
    } else {
      ctx.font=`bold ${omgR*2}px Georgia,serif`; ctx.fillStyle=rgba(G,1);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('Ω',cx2,dy);
    }
    ctx.shadowBlur=0;
    /* website */
    ctx.font='27px \'Be Vietnam Pro\',sans-serif'; ctx.fillStyle=rgba(G,.95);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('omega.com.vn',W/2,baseY+118);
    ctx.restore();
  }

  /* corner decorations */
  const cp=eO(prog(now,TL.s6s+600,TL.s6s+1600));
  if(cp>0){
    ctx.save(); ctx.globalAlpha=cp*.35*sa; ctx.strokeStyle=rgba(G,.7); ctx.lineWidth=1.2;
    [[60,60],[W-60,60],[60,H-60],[W-60,H-60]].forEach(([x,y],i)=>{
      const sx=i%2===0?1:-1, sy=i<2?1:-1;
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+sx*70,y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+sy*70); ctx.stroke();
    });
    ctx.restore();
  }
}

/* ── MAIN LOOP ── */
let t0=null;
function draw(ts){
  if(!t0)t0=ts;
  const now=ts-t0;
  drawBG(now);
  drawS1(now); drawS2(now); drawS3(now);
  drawS4(now); drawS5(now); drawS6(now);

  if(now<TL.end){
    requestAnimationFrame(draw);
  } else {
    /* Auto-loop: reset all state */
    t0=null; flashDone=false; prevNow=-1;
    requestAnimationFrame(draw);
  }
}
requestAnimationFrame(draw);
document.addEventListener('keydown',e=>{
  if(e.key==='F5'){e.preventDefault(); t0=null; flashDone=false; requestAnimationFrame(draw);}
});
}();
</script>
