<!DOCTYPE html>
<html lang="vi-VN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Chart - LAZINET</title>
    
    <style>
        :root {
            --primary-color: #0052FF;
            --secondary-color: #FF6F00;
            --bg-color: #0F162C;
            --card-bg: #1A2238;
            --text-color: #FFFFFF;
            --border-color: #2D3748;
            --accent-color: #3F82FB;
            --success-color: #10B981;
            --warning-color: #F59E0B;
            --danger-color: #EF4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #1E40AF 100%);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title-section h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0;
        }

        .header-controls {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        /* Stats Container */
        .stats-container {
            background: var(--card-bg);
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 1rem;
            border-left: 4px solid var(--accent-color);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-details {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        /* Gantt Container */
        .gantt-container {
            height: calc(100vh - 180px);
            padding: 0;
            overflow: hidden;
        }

        #gantt_here {
            width: 100% !important;
            height: 100% !important;
            background: var(--card-bg);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Loading */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 22, 44, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: var(--card-bg);
            border-left: 4px solid var(--success-color);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            z-index: 10000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            max-width: 400px;
        }

        .notification.show {
            transform: translateX(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .gantt-container {
                height: calc(100vh - 220px);
            }
        }
    </style>
</head>
<body>
    <!-- Loading -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">Đang kết nối...</div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification">
        <div id="notificationMessage"></div>
    </div>

    <!-- Header -->
    <header class="header">
        <div class="title-section">
            <h1>📊 LAZINET Gantt Chart</h1>
            <p>Dữ liệu thời gian thực từ Google Sheets</p>
        </div>
        <div class="header-controls">
            <button class="btn btn-secondary" onclick="autoFitTimeline()">
                🔍 Fit View
            </button>
            <button class="btn btn-primary" onclick="downloadChart('png')">
                📸 Xuất PNG
            </button>
            <button class="btn btn-secondary" onclick="refreshData()">
                🔄 Làm mới
            </button>
        </div>
    </header>

    <!-- Statistics -->
    <div class="stats-container" id="statsContainer">
        <!-- Loaded by JavaScript -->
    </div>

    <!-- Gantt Chart -->
    <div class="gantt-container">
        <div id="gantt_here"></div>
    </div>

    <!-- Libraries -->
    <script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        // ========== CONFIGURATION ==========
        // ⚠️ THAY ĐỔI URL NÀY THÀNH URL GAS CỦA BẠN ⚠️
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyYyyqD2mivBg1onDtcQSs6KpRmQ9bLJG_0915YSPA7Jau71XoY6R1XByZsKb8WnU2-iA/exec";
        
        // Backup fallback URL (JSONP format)
        const GAS_URL_JSONP = GAS_URL + "?callback=processGanttData";
        
        let allTasks = [];
        let currentGanttData = null;

        // ========== GANTT CONFIG ==========
        gantt.config.date_format = "%Y-%m-%d";
        gantt.config.scale_unit = "month";
        gantt.config.step = 1;
        gantt.config.subscales = [
            {unit: "week", step: 1, date: "Tuần #%W"}
        ];
        gantt.config.fit_tasks = true;
        gantt.config.autofit = true;
        gantt.config.row_height = 40;
        gantt.config.bar_height = 20;
        gantt.config.grid_width = 350;
        gantt.config.readonly = true;
        
        gantt.config.columns = [
            {name: "text", label: "Công việc", width: 200, tree: true},
            {name: "start_date", label: "Bắt đầu", width: 90, align: "center"},
            {name: "end_date", label: "Kết thúc", width: 90, align: "center"},
            {name: "progress", label: "Tiến độ", width: 70, align: "center", template: function(task) {
                return task.progress + "%";
            }},
            {name: "owner", label: "Người phụ trách", width: 120}
        ];

        // ========== INITIALIZE ==========
        document.addEventListener('DOMContentLoaded', function() {
            gantt.init("gantt_here");
            loadGanttData();
            
            // Auto-refresh every 2 minutes
            setInterval(loadGanttData, 2 * 60 * 1000);
        });

        // ========== LOAD DATA (FIXED CORS) ==========
        async function loadGanttData() {
            showLoading('Đang tải dữ liệu...');
            
            try {
                // Try fetch with CORS first
                const response = await fetch(GAS_URL + '?t=' + Date.now(), {
                    method: 'GET',
                    mode: 'cors',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const result = await response.json();
                    processGanttResult(result);
                } else {
                    // If CORS fails, try JSONP fallback
                    console.log('CORS failed, trying JSONP...');
                    loadWithJSONP();
                }
            } catch (fetchError) {
                console.log('Fetch error, trying JSONP...', fetchError);
                loadWithJSONP();
            }
        }

        function loadWithJSONP() {
            // JSONP fallback method
            const script = document.createElement('script');
            script.src = GAS_URL_JSONP + '&t=' + Date.now();
            document.head.appendChild(script);
            
            // Set timeout in case JSONP fails
            setTimeout(() => {
                if (!currentGanttData) {
                    showNotification('Không thể kết nối đến server', 'error');
                    hideLoading();
                }
            }, 10000);
        }

        // This function is called by JSONP response
        window.processGanttData = function(result) {
            processGanttResult(result);
        };

        function processGanttResult(result) {
            try {
                if (!result || !result.success) {
                    throw new Error(result?.error || 'Dữ liệu không hợp lệ');
                }
                
                const ganttData = {
                    data: result.data || [],
                    links: result.links || []
                };
                
                currentGanttData = ganttData;
                
                gantt.clearAll();
                gantt.parse(ganttData);
                
                updateStatistics(result.data || []);
                
                setTimeout(autoFitTimeline, 100);
                
                showNotification(`✅ Đã tải ${result.totalTasks || 0} công việc`, 'success');
                
            } catch (error) {
                console.error('Processing error:', error);
                showNotification('❌ Lỗi xử lý dữ liệu: ' + error.message, 'error');
                
                // Load sample data as fallback
                loadSampleData();
            } finally {
                hideLoading();
            }
        }

        function loadSampleData() {
            const sampleData = {
                data: [
                    {id: 1, text: "📋 Giai đoạn phân tích", start_date: "2024-01-01", duration: 30, progress: 100, parent: 0, open: true, owner: "Team A"},
                    {id: 2, text: "Phân tích yêu cầu", start_date: "2024-01-01", duration: 15, progress: 100, parent: 1, owner: "Nguyễn Văn A"},
                    {id: 3, text: "Thiết kế hệ thống", start_date: "2024-01-16", duration: 15, progress: 100, parent: 1, owner: "Trần Thị B"},
                    {id: 4, text: "🚀 Giai đoạn phát triển", start_date: "2024-02-01", duration: 90, progress: 65, parent: 0, open: true, owner: "Team B"},
                    {id: 5, text: "Phát triển Backend", start_date: "2024-02-01", duration: 45, progress: 90, parent: 4, owner: "Lê Văn C"},
                    {id: 6, text: "Phát triển Frontend", start_date: "2024-03-01", duration: 45, progress: 70, parent: 4, owner: "Phạm Thị D"},
                    {id: 7, text: "🧪 Giai đoạn kiểm thử", start_date: "2024-05-01", duration: 30, progress: 20, parent: 0, open: true, owner: "Team C"},
                    {id: 8, text: "Kiểm thử đơn vị", start_date: "2024-05-01", duration: 15, progress: 30, parent: 7, owner: "Hồ Văn E"},
                    {id: 9, text: "Kiểm thử tích hợp", start_date: "2024-05-16", duration: 15, progress: 10, parent: 7, owner: "Nguyễn Thị F"}
                ],
                links: [
                    {id: 1, source: 2, target: 3, type: "0"},
                    {id: 2, source: 3, target: 5, type: "0"},
                    {id: 3, source: 5, target: 6, type: "0"},
                    {id: 4, source: 6, target: 8, type: "0"},
                    {id: 5, source: 8, target: 9, type: "0"}
                ]
            };
            
            gantt.clearAll();
            gantt.parse(sampleData);
            updateStatistics(sampleData.data);
            showNotification('⚠️ Đang sử dụng dữ liệu mẫu', 'warning');
        }

        // ========== STATISTICS ==========
        function updateStatistics(tasks) {
            allTasks = tasks;
            
            const totalTasks = tasks.length;
            const completedTasks = tasks.filter(t => t.progress === 100).length;
            const inProgressTasks = tasks.filter(t => t.progress > 0 && t.progress < 100).length;
            const notStartedTasks = tasks.filter(t => t.progress === 0).length;
            
            let totalDuration = 0;
            let overdueTasks = 0;
            const today = new Date();
            
            tasks.forEach(task => {
                if (task.end_date) {
                    const endDate = new Date(task.end_date);
                    const daysDiff = Math.ceil((endDate - today) / (1000 * 60 * 60 * 24));
                    if (task.progress < 100 && daysDiff < 0) overdueTasks++;
                }
                if (task.duration) totalDuration += task.duration;
            });
            
            const overallProgress = tasks.length > 0 
                ? Math.round(tasks.reduce((sum, task) => sum + (task.progress || 0), 0) / tasks.length)
                : 0;
            
            const statsHTML = `
                <div class="stat-card" style="border-left-color: ${overallProgress === 100 ? '#10B981' : overallProgress >= 50 ? '#F59E0B' : '#EF4444'}">
                    <div class="stat-value">${overallProgress}%</div>
                    <div class="stat-details">Tổng tiến độ</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-value">${totalTasks}</div>
                    <div class="stat-details">Tổng công việc</div>
                </div>
                
                <div class="stat-card" style="border-left-color: #10B981">
                    <div class="stat-value">${completedTasks}</div>
                    <div class="stat-details">Đã hoàn thành</div>
                </div>
                
                <div class="stat-card" style="border-left-color: #F59E0B">
                    <div class="stat-value">${inProgressTasks}</div>
                    <div class="stat-details">Đang thực hiện</div>
                </div>
                
                ${overdueTasks > 0 ? `
                <div class="stat-card" style="border-left-color: #EF4444">
                    <div class="stat-value">${overdueTasks}</div>
                    <div class="stat-details">Quá hạn</div>
                </div>
                ` : ''}
                
                <div class="stat-card">
                    <div class="stat-value">${totalDuration}</div>
                    <div class="stat-details">Ngày công</div>
                </div>
            `;
            
            document.getElementById('statsContainer').innerHTML = statsHTML;
        }

        // ========== FUNCTIONS ==========
        function autoFitTimeline() {
            try {
                let minDate = null;
                let maxDate = null;
                
                gantt.eachTask(function(task) {
                    if (!task.start_date) return;
                    const start = gantt.date.str_to_date(task.start_date);
                    const end = gantt.calculateEndDate(task.start_date, task.duration);
                    
                    if (!minDate || start < minDate) minDate = start;
                    if (!maxDate || end > maxDate) maxDate = end;
                });
                
                if (minDate && maxDate) {
                    const padding = (maxDate - minDate) * 0.1;
                    gantt.showDate(new Date(minDate.getTime() - padding), new Date(maxDate.getTime() + padding));
                    gantt.render();
                    showNotification('🎯 Đã fit timeline', 'success');
                }
            } catch (error) {
                console.error('Fit error:', error);
            }
        }

        function downloadChart(format) {
            showLoading('Đang xuất...');
            
            setTimeout(() => {
                html2canvas(document.getElementById('gantt_here')).then(canvas => {
                    if (format === 'png') {
                        const link = document.createElement('a');
                        link.download = `gantt_${new Date().toISOString().split('T')[0]}.png`;
                        link.href = canvas.toDataURL('image/png');
                        link.click();
                        showNotification('✅ Đã xuất PNG', 'success');
                    } else if (format === 'pdf') {
                        const { jsPDF } = window.jspdf;
                        const pdf = new jsPDF('l', 'mm', 'a4');
                        const imgData = canvas.toDataURL('image/png');
                        const imgWidth = 280;
                        const imgHeight = canvas.height * imgWidth / canvas.width;
                        
                        pdf.addImage(imgData, 'PNG', 10, 10, imgWidth, imgHeight);
                        pdf.save(`gantt_${new Date().toISOString().split('T')[0]}.pdf`);
                        showNotification('✅ Đã xuất PDF', 'success');
                    }
                    hideLoading();
                });
            }, 500);
        }

        function refreshData() {
            loadGanttData();
        }

        // ========== UI HELPERS ==========
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            const messageEl = document.getElementById('notificationMessage');
            
            notification.style.borderLeftColor = type === 'success' ? '#10B981' : 
                                               type === 'error' ? '#EF4444' : '#F59E0B';
            
            messageEl.textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function showLoading(text) {
            const overlay = document.getElementById('loadingOverlay');
            document.getElementById('loadingText').textContent = text;
            overlay.style.display = 'flex';
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'none';
        }
    </script>
</body>
</html>
