<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Hoạt Cảnh SVG - Song Ngọc</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-orange: #F38022;
            --color-green: #00854A;
            --color-bg: #0d0f12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--color-bg);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        #banner-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #1a2228 0%, #050608 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-bottom: 3px solid var(--color-orange);
        }

        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.5;
            z-index: 0;
        }

        /* --- STAGE 1: THANH THÉP --- */
        .stage-bars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .bar-wrapper {
            position: absolute;
            width: 60%;
            height: 20px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            display: flex;
            align-items: center;
        }

        .bar-orange-wrapper { top: 40%; margin-left: 10%; }
        .bar-green-wrapper { top: 60%; margin-left: -10%; }

        .metal-bar {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 4px;
        }

        .metal-bar.orange { background: linear-gradient(0deg, #b05a14, var(--color-orange), #ff9e4f); }
        .metal-bar.green { background: linear-gradient(0deg, #00552f, var(--color-green), #00ba68); }

        .spark {
            position: absolute;
            width: 15px; height: 15px;
            background: #ffffff;
            border-radius: 50%;
            opacity: 0;
            z-index: 15;
            box-shadow: 0 0 20px 10px rgba(255, 255, 255, 0.8), 0 0 40px 20px var(--color-orange);
            mix-blend-mode: screen;
        }
        .bar-green-wrapper .spark { box-shadow: 0 0 20px 10px rgba(255, 255, 255, 0.8), 0 0 40px 20px var(--color-green); }

        /* --- STAGE 2: FLASH & SVG LOGO --- */
        .flash-bang {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
        }

        .stage-final {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: scale(0.5);
        }

        /* TÁI TẠO LOGO SN BẰNG SVG */
        .logo-svg-wrapper {
            width: 300px; /* Điều chỉnh kích thước logo SVG tại đây */
            height: auto;
            margin-bottom: 30px;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.5));
        }

        .company-name {
            text-align: center;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .company-prefix { font-size: 1rem; font-weight: 500; margin-bottom: 5px; color: #a0aab2; }
        .company-main {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(90deg, var(--color-green) 0%, var(--color-orange) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- CSS ANIMATIONS (Giữ nguyên) --- */
        .anim-show-bar { animation: fadeInBar 1s forwards cubic-bezier(0.1, 0.8, 0.2, 1); }
        @keyframes fadeInBar { 0% { opacity: 0; transform: translateX(-50%) scaleX(0); } 100% { opacity: 1; transform: translateX(-50%) scaleX(1); } }

        .anim-welding { animation: weldMove 2s forwards linear, flicker 0.1s infinite alternate; }
        @keyframes weldMove { 0% { opacity: 1; right: 0%; left: auto; } 100% { opacity: 1; right: 100%; left: auto; } }
        @keyframes flicker { 0% { transform: scale(0.8) translateY(-50%); opacity: 0.8; } 100% { transform: scale(1.3) translateY(-50%); opacity: 1; } }

        .anim-collapse-orange { animation: collapseOrange 0.8s forwards cubic-bezier(0.7, 0, 0.3, 1); }
        .anim-collapse-green { animation: collapseGreen 0.8s forwards cubic-bezier(0.7, 0, 0.3, 1); }
        @keyframes collapseOrange { 0% { width: 60%; transform: translate(-50%, 0) rotate(0deg); } 100% { width: 10%; transform: translate(50%, 50px) rotate(45deg); opacity: 0;} }
        @keyframes collapseGreen { 0% { width: 60%; transform: translate(-50%, 0) rotate(0deg); } 100% { width: 10%; transform: translate(-150%, -50px) rotate(-45deg); opacity: 0;} }

        .anim-flash { animation: blastFlash 1.5s forwards ease-out; }
        @keyframes blastFlash { 0% { opacity: 0; } 10% { opacity: 1; } 100% { opacity: 0; } }

        .anim-reveal-logo { animation: revealLogo 1.5s forwards cubic-bezier(0.1, 0.8, 0.2, 1); }
        @keyframes revealLogo { 0% { opacity: 0; transform: scale(0.5) translateY(50px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body>

<div id="banner-container">
    <div class="grid-bg"></div>

    <div class="stage-bars" id="stageBars">
        <div class="bar-wrapper bar-orange-wrapper" id="wrapOrange">
            <div class="metal-bar orange"></div>
            <div class="spark" id="sparkOrange" style="top: 50%; transform: translateY(-50%);"></div>
        </div>
        <div class="bar-wrapper bar-green-wrapper" id="wrapGreen">
            <div class="metal-bar green"></div>
            <div class="spark" id="sparkGreen" style="top: 50%; transform: translateY(-50%);"></div>
        </div>
    </div>

    <div class="flash-bang" id="flashBang"></div>

    <div class="stage-final" id="stageFinal">
        
        <svg class="logo-svg-wrapper" viewBox="0 0 350 150" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M100 10V40H10V110H100V140H110" stroke="#00854A" stroke-width="12" stroke-linejoin="miter"/>
            <path d="M93 17V33H17V117H93V133H107" stroke="#F38022" stroke-width="6" stroke-linejoin="miter"/>
            
            <path d="M160 140V10L240 140V10" stroke="#00854A" stroke-width="12" stroke-linejoin="miter"/>
            <path d="M167 133V17L233 117V17" stroke="#F38022" stroke-width="6" stroke-linejoin="miter"/>
            
            <path d="M110 140H160" stroke="#00854A" stroke-width="12"/>
            <path d="M107 133H167" stroke="#F38022" stroke-width="6"/>
        </svg>

        <div class="company-name">
            <div class="company-prefix">CÔNG TY TNHH CƠ KHÍ XÂY DỰNG</div>
            <div class="company-main">SONG NGỌC</div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const wrapOrange = document.getElementById('wrapOrange');
        const wrapGreen = document.getElementById('wrapGreen');
        const sparkOrange = document.getElementById('sparkOrange');
        const sparkGreen = document.getElementById('sparkGreen');
        const flashBang = document.getElementById('flashBang');
        const stageFinal = document.getElementById('stageFinal');
        const stageBars = document.getElementById('stageBars');
        
        // Timeline kịch bản (milliseconds)
        setTimeout(() => { wrapOrange.classList.add('anim-show-bar'); wrapGreen.classList.add('anim-show-bar'); }, 500);
        setTimeout(() => { sparkOrange.classList.add('anim-welding'); sparkGreen.classList.add('anim-welding'); }, 1800);
        setTimeout(() => { 
            sparkOrange.style.display = 'none'; sparkGreen.style.display = 'none';
            wrapOrange.classList.add('anim-collapse-orange');
            wrapGreen.classList.add('anim-collapse-green');
        }, 3800);
        setTimeout(() => { 
            flashBang.classList.add('anim-flash');
            setTimeout(() => { stageBars.style.display = 'none'; }, 100); 
        }, 4400);
        setTimeout(() => { stageFinal.classList.add('anim-reveal-logo'); }, 4600);
    });
</script>

</body>
</html>
