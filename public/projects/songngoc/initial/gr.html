<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banner Hiệu Ứng - CÔNG TY TNHH CƠ KHÍ XÂY DỰNG SONG NGỌC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- GSAP Core -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <!-- MotionPathPlugin (bắt buộc cho animation thanh thép di chuyển) -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/MotionPathPlugin.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { margin:0; padding:0; overflow:hidden; }
        
        .banner {
            width: 100vw;
            height: 620px;
            background: linear-gradient(135deg, #001a0f 0%, #1a1100 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        svg { width: 100%; max-width: 1400px; height: 100%; }
    </style>
</head>
<body>
    <div class="banner">
        <svg id="bannerSVG" width="1400" height="620" viewBox="0 0 1400 620" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="1400" height="620" fill="url(#metalGradient)" opacity="0.15"/>
            
            <!-- Thanh thép cam -->
            <path id="barCam" d="M280 210 L1120 210" stroke="#F38022" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>
            
            <!-- Thanh thép lục -->
            <path id="barGreen" d="M280 290 L1120 290" stroke="#00854A" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" opacity="0"/>
            
            <defs>
                <linearGradient id="metalGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
                    <stop offset="50%" stop-color="#ffffff" stop-opacity="0.15"/>
                    <stop offset="100%" stop-color="#ffffff" stop-opacity="0.4"/>
                </linearGradient>
                <filter id="sparkGlow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur stdDeviation="8" result="blur"/>
                    <feFlood flood-color="#ffeb3b" flood-opacity="0.9"/>
                    <feComposite in="blur" in2="SourceGraphic" operator="out"/>
                    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
            </defs>
            
            <!-- Tia hàn -->
            <circle id="sparkCam" r="14" fill="#FFEB3B" opacity="0" filter="url(#sparkGlow)"/>
            <circle id="sparkGreen" r="14" fill="#FFEB3B" opacity="0" filter="url(#sparkGlow)"/>
            
            <!-- Chữ SN nét đôi (cam + lục) -->
            <path id="S_cam" d="M380 380 Q460 260 540 380 Q620 500 700 380" stroke="#F38022" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" fill="transparent" opacity="0" stroke-dasharray="800" stroke-dashoffset="800"/>
            <path id="S_green" d="M410 380 Q490 270 560 380 Q630 490 690 380" stroke="#00854A" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="transparent" opacity="0" stroke-dasharray="800" stroke-dashoffset="800"/>
            
            <path id="N_green" d="M780 260 L780 500 L920 260 L920 500" stroke="#00854A" stroke-width="38" stroke-linecap="round" stroke-linejoin="round" fill="transparent" opacity="0" stroke-dasharray="1200" stroke-dashoffset="1200"/>
            <path id="N_cam" d="M810 260 L810 500 L950 260 L950 500" stroke="#F38022" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="transparent" opacity="0" stroke-dasharray="1200" stroke-dashoffset="1200"/>
            
            <!-- Tên công ty -->
            <text id="companyName" x="700" y="570" text-anchor="middle" fill="#ffffff" font-family="Inter" font-size="42" font-weight="900" opacity="0" letter-spacing="4px">CÔNG TY TNHH CƠ KHÍ XÂY DỰNG SONG NGỌC</text>
            
            <!-- Logo thật -->
            <image id="realLogo" href="https://songngoc.com.vn/thumbs/202x116x2/upload/photo/lg-1763624100.png.webp" x="620" y="80" width="160" height="93" opacity="0"/>
        </svg>
    </div>

    <script>
        // Đăng ký plugin MotionPath (đây là nguyên nhân gây lỗi trước đó)
        gsap.registerPlugin(MotionPathPlugin);
        
        const tl = gsap.timeline({ defaults: { ease: "power2.inOut" } });
        
        // 1. Thanh thép bay vào
        tl.to("#barCam", { opacity: 1, duration: 1.2, attr: { d: "M320 210 L1080 210" } }, 0)
          .to("#barGreen", { opacity: 1, duration: 1.2, attr: { d: "M280 290 L1040 290" } }, 0.2);
        
        // 2. Tia hàn chạy (hiệu ứng hàn kim loại)
        tl.to("#sparkCam", {
            opacity: 1,
            motionPath: { path: "#barCam", align: "#barCam", alignOrigin: [0.5, 0.5] },
            duration: 1.8
        }, 1.4)
        .to("#sparkGreen", {
            opacity: 1,
            motionPath: { path: "#barGreen", align: "#barGreen", alignOrigin: [0.5, 0.5] },
            duration: 1.8
        }, 1.6);
        
        // 3. Cắt thanh thép
        tl.to("#barCam", { attr: { d: "M320 210 L680 210" }, duration: 0.6 }, 3.4)
          .to("#barCam", { attr: { d: "M720 210 L1080 210" }, x: 40, duration: 0.6 }, 3.5)
          .to("#barGreen", { attr: { d: "M280 290 L640 290" }, duration: 0.6 }, 3.4)
          .to("#barGreen", { attr: { d: "M760 290 L1040 290" }, x: -40, duration: 0.6 }, 3.5);
        
        // 4. Ẩn thanh cũ + hiện chữ SN nét đôi
        tl.to(["#barCam", "#barGreen"], { opacity: 0, duration: 0.8 }, 4.4)
          .to("#S_cam", { opacity: 1, strokeDashoffset: 0, duration: 1.6 }, 4.6)
          .to("#S_green", { opacity: 1, strokeDashoffset: 0, duration: 1.6 }, 4.9)
          .to("#N_green", { opacity: 1, strokeDashoffset: 0, duration: 1.8 }, 5.2)
          .to("#N_cam", { opacity: 1, strokeDashoffset: 0, duration: 1.8 }, 5.4);
        
        // 5. Tên công ty + Logo thật
        .to("#companyName", { opacity: 1, y: -20, duration: 1.2 }, 6.8)
        .to("#realLogo", { opacity: 1, scale: 1.1, duration: 1, ease: "back.out(1.4)" }, 7.2);
        
        // 6. Glow kim loại lặp nhẹ
        .to(["#S_cam", "#S_green", "#N_green", "#N_cam"], {
            filter: "drop-shadow(0 0 35px #f38022)",
            duration: 1.2,
            repeat: 3,
            yoyo: true
        }, 7.8);
        
        console.log('%c✅ Banner Song Ngọc đã chạy mượt!', 'color:#00ff88; font-size:18px; font-weight:900');
    </script>
</body>
</html>
