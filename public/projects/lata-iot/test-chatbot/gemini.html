<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard IoT | RS485 Sensor</title>
    
    <link rel="icon" href="https://lazinet.com/assets/img/logo-lazinet/lazinet_LogoOnly.png" type="image/png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .navbar-brand img {
            height: 40px;
            margin-right: 10px;
        }
        .card-custom {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }
        .card-custom:hover {
            transform: translateY(-5px);
        }
        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .bg-temp { background-color: #ffe8e8; color: #ff4d4d; }
        .bg-humid { background-color: #e0f2fe; color: #0284c7; }
        
        .value-text {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
        }
        footer {
            margin-top: 50px;
            padding: 20px 0;
            color: #6c757d;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="https://lazinet.com/assets/img/logo-lazinet/lazinet_LogoOnly.png" alt="LAZINET Logo">
                <strong>Hệ Thống Giám Sát IoT</strong>
            </a>
            <span class="badge bg-success">RS485 Active <i class="fa-solid fa-circle-check ms-1"></i></span>
        </div>
    </nav>

    <div class="container mt-4">
        
        <div class="row mb-4">
            <div class="col-12">
                <h4 class="mb-1">Dữ liệu thời gian thực</h4>
                <p class="text-muted">Cập nhật liên tục từ cảm biến chuẩn RS485</p>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-6 col-lg-6">
                <div class="card card-custom p-4 h-100 bg-white">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1 text-uppercase fw-bold">Nhiệt Độ Của Môi Trường</p>
                            <h2 class="value-text" id="tempValue">--.- <small class="fs-4">°C</small></h2>
                        </div>
                        <div class="icon-box bg-temp">
                            <i class="fa-solid fa-temperature-three-quarters"></i>
                        </div>
                    </div>
                    <div class="mt-3">
                        <small class="text-muted"><i class="fa-solid fa-clock me-1"></i> Cập nhật lần cuối: <span id="tempTime">--:--:--</span></small>
                    </div>
                </div>
            </div>

            <div class="col-md-6 col-lg-6">
                <div class="card card-custom p-4 h-100 bg-white">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="text-muted mb-1 text-uppercase fw-bold">Độ Ẩm Tương Đối</p>
                            <h2 class="value-text" id="humidValue">--.- <small class="fs-4">%</small></h2>
                        </div>
                        <div class="icon-box bg-humid">
                            <i class="fa-solid fa-droplet"></i>
                        </div>
                    </div>
                    <div class="mt-3">
                        <small class="text-muted"><i class="fa-solid fa-clock me-1"></i> Cập nhật lần cuối: <span id="humidTime">--:--:--</span></small>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card card-custom p-4 bg-white">
                    <h5 class="mb-3">Biểu đồ xu hướng</h5>
                    <div style="height: 350px;">
                        <canvas id="sensorChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <footer class="text-center">
        <div class="container">
            <p class="mb-0 fw-bold">LAZINET</p>
            <p class="small">Thông minh – Hiệu quả – Phát triển</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Cấu hình biểu đồ Chart.js
        const ctx = document.getElementById('sensorChart').getContext('2d');
        const maxDataPoints = 15; // Hiển thị 15 điểm dữ liệu gần nhất

        const sensorChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], // Lưu trữ thời gian
                datasets: [
                    {
                        label: 'Nhiệt độ (°C)',
                        data: [],
                        borderColor: '#ff4d4d',
                        backgroundColor: 'rgba(255, 77, 77, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        yAxisID: 'y'
                    },
                    {
                        label: 'Độ ẩm (%)',
                        data: [],
                        borderColor: '#0284c7',
                        backgroundColor: 'rgba(2, 132, 199, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        yAxisID: 'y1'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: {
                    mode: 'index',
                    intersect: false,
                },
                scales: {
                    x: {
                        grid: { display: false }
                    },
                    y: {
                        type: 'linear',
                        display: true,
                        position: 'left',
                        title: { display: true, text: 'Nhiệt độ (°C)' },
                        suggestedMin: 20,
                        suggestedMax: 40
                    },
                    y1: {
                        type: 'linear',
                        display: true,
                        position: 'right',
                        title: { display: true, text: 'Độ ẩm (%)' },
                        suggestedMin: 40,
                        suggestedMax: 100,
                        grid: { drawOnChartArea: false }
                    }
                }
            }
        });

        // Hàm mô phỏng dữ liệu nhận từ cảm biến RS485
        function fetchSensorData() {
            // Trong thực tế, bạn sẽ dùng fetch() hoặc WebSocket để gọi API tại đây
            // Ví dụ: fetch('/api/rs485-data').then(res => res.json()).then(data => updateUI(data));
            
            // Dữ liệu mô phỏng (Mock Data)
            const currentTemp = (25 + Math.random() * 5).toFixed(1); // 25.0 -> 30.0 °C
            const currentHumid = (60 + Math.random() * 15).toFixed(1); // 60.0 -> 75.0 %
            const now = new Date();
            const timeString = now.toLocaleTimeString('vi-VN');

            updateUI(currentTemp, currentHumid, timeString);
        }

        // Hàm cập nhật Giao diện và Biểu đồ
        function updateUI(temp, humid, timeStr) {
            // Cập nhật text trên Card
            document.getElementById('tempValue').innerHTML = `${temp} <small class="fs-4">°C</small>`;
            document.getElementById('humidValue').innerHTML = `${humid} <small class="fs-4">%</small>`;
            document.getElementById('tempTime').innerText = timeStr;
            document.getElementById('humidTime').innerText = timeStr;

            // Cập nhật biểu đồ
            const dataLabels = sensorChart.data.labels;
            const tempData = sensorChart.data.datasets[0].data;
            const humidData = sensorChart.data.datasets[1].data;

            dataLabels.push(timeStr);
            tempData.push(temp);
            humidData.push(humid);

            // Xóa điểm dữ liệu cũ nếu vượt quá giới hạn (tạo hiệu ứng trượt)
            if (dataLabels.length > maxDataPoints) {
                dataLabels.shift();
                tempData.shift();
                humidData.shift();
            }

            sensorChart.update();
        }

        // Khởi động vòng lặp lấy dữ liệu (Mỗi 3 giây)
        setInterval(fetchSensorData, 3000);
        
        // Gọi lần đầu ngay khi load trang
        fetchSensorData();
    </script>
</body>
</html>
