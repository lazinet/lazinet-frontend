<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Dashboard - Nhiệt độ & Độ ẩm</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://lazinet.com/assets/img/logo-lazinet/lazinet_LogoOnly.png">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      color: #333;
    }

    header {
      background: #1f2937;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 15px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    .value {
      font-size: 2.5em;
      margin: 10px 0;
      font-weight: bold;
    }

    .label {
      font-size: 1.1em;
      color: #777;
    }

    .status {
      margin-top: 10px;
      font-size: 0.9em;
      color: #999;
    }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 0.8em;
      color: #aaa;
    }

    @media (max-width: 500px) {
      .value {
        font-size: 2em;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>IoT Dashboard</h1>
  <p>RS485 Sensor - Temperature & Humidity</p>
</header>

<div class="container">
  <div class="card">
    <div class="label">🌡 Nhiệt độ</div>
    <div class="value" id="temp">-- °C</div>
    <div class="status" id="tempStatus">Đang chờ dữ liệu...</div>
  </div>

  <div class="card">
    <div class="label">💧 Độ ẩm</div>
    <div class="value" id="humi">-- %</div>
    <div class="status" id="humiStatus">Đang chờ dữ liệu...</div>
  </div>
</div>

<footer>
  © 2026 IoT RS485 Dashboard
</footer>

<script>
  // Giả lập dữ liệu (sau này thay bằng API thật hoặc WebSocket)
  function fetchData() {
    // Random demo
    const temperature = (Math.random() * 15 + 20).toFixed(1);
    const humidity = (Math.random() * 40 + 40).toFixed(1);

    updateUI(temperature, humidity);
  }

  function updateUI(temp, humi) {
    document.getElementById("temp").innerText = temp + " °C";
    document.getElementById("humi").innerText = humi + " %";

    // Status logic
    let tempStatus = "Bình thường";
    if (temp > 35) tempStatus = "⚠️ Nhiệt độ cao";
    if (temp < 15) tempStatus = "⚠️ Nhiệt độ thấp";

    let humiStatus = "Bình thường";
    if (humi > 80) humiStatus = "⚠️ Độ ẩm cao";
    if (humi < 30) humiStatus = "⚠️ Độ ẩm thấp";

    document.getElementById("tempStatus").innerText = tempStatus;
    document.getElementById("humiStatus").innerText = humiStatus;
  }

  // Refresh mỗi 3 giây
  setInterval(fetchData, 3000);

  fetchData();

  // Ví dụ: thay fetchData bằng API thật
  /*
  async function fetchData() {
    const res = await fetch("http://your-api/sensor");
    const data = await res.json();

    updateUI(data.temperature, data.humidity);
  }
  */
</script>

</body>
</html>
