<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SN Intro — Hiệu ứng 1 (thanh kim loại cháy sáng)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  .viewport {
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }
  #stage {
    width: 1920px;
    height: 1080px;
    transform-origin: center center;
    flex: none;
    position: relative;
  }
  #stage svg { display: block; width: 100%; height: 100%; }
  #confettiCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }
  #hud {
    position: fixed;
    left: 12px;
    bottom: 12px;
    z-index: 10;
    font-family: ui-monospace, monospace;
    font-size: 12px;
    color: #9aa0ff;
    background: rgba(0,0,0,.55);
    padding: 8px 12px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #hud button {
    font-family: inherit;
    font-size: 12px;
    background: #1b1e3a;
    color: #cfd2ff;
    border: 1px solid #3a3f7a;
    border-radius: 5px;
    padding: 4px 10px;
    cursor: pointer;
  }
  #hud button:hover { background: #2a2f5a; }
  #hud button:disabled { opacity: .5; cursor: default; }
  #hud button.active { border-color: #7c8cff; color: #fff; }
  #exportStatus { color: #ffd23f; }
  /* #hud không thuộc khung 1920x1080 — khi quay video chỉ crop vùng #stage */

  /* Canvas xuất video riêng — không dính nút điều khiển, luôn đúng 1920x1080 dù cửa sổ nhỏ */
  #exportOverlay {
    display: none;
    position: fixed; inset: 0; z-index: 999;
    background: #000;
    align-items: center; justify-content: center;
    flex-direction: column; gap: 14px;
  }
  #exportOverlay.active { display: flex; }
  #exportCanvas { width: auto; height: auto; max-width: 100vw; max-height: 92vh; }
  #exportLabel {
    font-family: ui-monospace, monospace; font-size: 13px; color: #cfd2ff;
  }
</style>
</head>
<body>

<div class="viewport">
  <div id="stage">
    <canvas id="confettiCanvas" width="1920" height="1080"></canvas>
  </div>
</div>

<div id="exportOverlay">
  <canvas id="exportCanvas" width="1920" height="1080"></canvas>
  <div id="exportLabel">Đang ghi hình…</div>
</div>

<div id="hud">
  <button id="btnReplay">Phát lại</button>
  <button id="btnMusic">Chọn nhạc</button>
  <button id="btnExport">Xuất video</button>
  <input type="file" id="musicInput" accept="audio/*" style="display:none">
  <span id="hudTime">0.0s / 0.0s</span>
  <span id="exportStatus"></span>
</div>

// =============================================
// PRNG có seed để bố cục "ngẫu nhiên" lặp lại giống nhau mỗi lần phát
// (thuận tiện khi quay video nhiều lần)
// =============================================
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const rng = mulberry32(20260713);
const rand = (min, max) => min + rng() * (max - min);
const randSign = () => (rng() < 0.5 ? -1 : 1);

// =============================================
// Hình học chữ S/N — công thức giống hệt logo-redraw.html (đã kiểm chứng khớp .xlsm)
// =============================================
function lineCross(P1, P2, P3, P4) {
  const denom = (P1.x - P2.x) * (P3.y - P4.y) - (P1.y - P2.y) * (P3.x - P4.x);
  if (Math.abs(denom) < 1e-8) return { x: NaN, y: NaN };
  const numX = (P1.x * P2.y - P2.x * P1.y) * (P3.x - P4.x) - (P3.x * P4.y - P4.x * P3.y) * (P1.x - P2.x);
  const numY = (P1.x * P2.y - P2.x * P1.y) * (P3.y - P4.y) - (P3.x * P4.y - P4.x * P3.y) * (P1.y - P2.y);
  return { x: numX / denom, y: numY / denom };
}

function computePoints(alphaDeg, h) {
  const alpha = alphaDeg * Math.PI / 180;
  const cosA = Math.cos(alpha), tanA = Math.tan(alpha);
  const a = h / cosA;
  const d = h / (6 + 3 * cosA);
  const s = d / cosA;

  const P = {};
  P.O = { x: 0, y: 0 };
  P.D = { x: 0, y: h };
  P.A = { x: h * tanA, y: 0 };
  P.S = { x: P.A.x + s, y: P.A.y };
  P.T = { x: P.S.x + s, y: P.A.y };
  P.B = { x: P.A.x + a, y: 0 };
  P.C = { x: a, y: h };

  P.p1 = { x: d * tanA * 1, y: h - d * 1 };
  P.p2 = { x: d * tanA * 2, y: h - d * 2 };
  P.p3 = { x: d * tanA * 3, y: h - d * 3 };
  P.p4 = { x: P.A.x - d * tanA * (4 - 3), y: d * (4 - 3) };
  P.p5 = { x: P.A.x - d * tanA * (5 - 3), y: d * (5 - 3) };
  P.p6 = { x: P.A.x - d * tanA * (6 - 3), y: d * (6 - 3) };

  P.p7  = { x: P.p4.x + s, y: P.p4.y };
  P.p9  = { x: P.p5.x + 2 * s, y: P.p5.y };
  P.p12 = { x: P.p4.x + a, y: P.p4.y };
  P.p13 = { x: P.p5.x + a, y: P.p5.y };
  P.p14 = { x: P.p6.x + a, y: P.p6.y };
  P.p15 = { x: P.p3.x + a, y: P.p3.y };
  P.p16 = { x: P.p2.x + a, y: P.p2.y };
  P.p17 = { x: P.p1.x + a, y: P.p1.y };
  P.p18 = { x: P.C.x - s, y: P.C.y };
  P.p19 = { x: P.p17.x - s, y: P.p17.y };
  P.p21 = { x: P.B.x - s, y: P.B.y };
  P.p22 = { x: P.p21.x - s, y: P.p21.y };
  P.p25 = { x: P.p18.x - s, y: P.p18.y };

  P.p8  = lineCross(P.p5, P.p17, P.S, P.p7);
  P.p10 = lineCross(P.p4, P.p16, P.p9, P.T);
  P.p11 = lineCross(P.A, P.p15, P.p6, P.p14);
  P.p20 = lineCross(P.p4, P.p16, P.p18, P.p21);
  P.p23 = lineCross(P.p5, P.p17, P.p22, P.p25);
  P.p24 = lineCross(P.p2, P.p16, P.p22, P.p25);
  P.p26 = lineCross(P.p6, P.C, P.p3, P.p15);

  return { P, a, d, s };
}

function trimPoint(from, to, dist) {
  const dx = to.x - from.x, dy = to.y - from.y;
  const len = Math.hypot(dx, dy);
  const t = (len < 1e-9) ? 0 : Math.min(dist, len / 2) / len;
  return { x: from.x + dx * t, y: from.y + dy * t };
}

function buildRoundedPathCommands(vertices, roundSet, radius) {
  const n = vertices.length;
  const cmds = [];
  for (let i = 0; i < n; i++) {
    const prev = vertices[(i - 1 + n) % n];
    const cur = vertices[i];
    const next = vertices[(i + 1) % n];
    if (radius > 0 && roundSet.has(cur.label)) {
      const p1 = trimPoint(cur, prev, radius);
      const p2 = trimPoint(cur, next, radius);
      cmds.push({ type: i === 0 ? 'M' : 'L', x: p1.x, y: p1.y });
      cmds.push({ type: 'Q', cx: cur.x, cy: cur.y, x: p2.x, y: p2.y });
    } else {
      cmds.push({ type: i === 0 ? 'M' : 'L', x: cur.x, y: cur.y });
    }
  }
  cmds.push({ type: 'Z' });
  return cmds;
}

function transformCommands(cmds, fn) {
  return cmds.map(c => {
    if (c.type === 'Z') return c;
    if (c.type === 'Q') {
      const ctrl = fn({ x: c.cx, y: c.cy });
      const end = fn({ x: c.x, y: c.y });
      return { type: 'Q', cx: ctrl.x, cy: ctrl.y, x: end.x, y: end.y };
    }
    const p = fn({ x: c.x, y: c.y });
    return { type: c.type, x: p.x, y: p.y };
  });
}

function serializePath(cmds) {
  let d = '';
  for (const c of cmds) {
    if (c.type === 'M') d += `M ${c.x.toFixed(2)},${c.y.toFixed(2)} `;
    else if (c.type === 'L') d += `L ${c.x.toFixed(2)},${c.y.toFixed(2)} `;
    else if (c.type === 'Q') d += `Q ${c.cx.toFixed(2)},${c.cy.toFixed(2)} ${c.x.toFixed(2)},${c.y.toFixed(2)} `;
    else if (c.type === 'Z') d += 'Z';
  }
  return d;
}

function makeSToNTransform(tx, pivot, angleDeg, doFlip) {
  const rad = angleDeg * Math.PI / 180;
  const cos = Math.cos(rad), sin = Math.sin(rad);
  return function (p) {
    let x = p.x + tx, y = p.y;
    if (doFlip) x = 2 * pivot.x - x;
    const dx = x - pivot.x, dy = y - pivot.y;
    return { x: pivot.x + dx * cos + dy * sin, y: pivot.y - dx * sin + dy * cos };
  };
}

// ---- Tính hình học S/N (α=15°, h=1000, bo góc=50 — khớp mặc định logo-redraw.html) ----
const { P, a, d, s } = computePoints(15, 1000);

const shape2 = [label('9', P.p9), label('10', P.p10), label('20', P.p20), label('19', P.p19), label('1', P.p1), label('D', P.D), label('C', P.C), label('15', P.p15), label('11', P.p11), label('14', P.p14), label('13', P.p13)];
const round1 = new Set(['A', '6']);
const round2 = new Set(['C', '15']);

const cmds1 = buildRoundedPathCommands(shape1, round1, RADIUS);

const sAll = [...shape1, ...shape2];

const cx0 = (Math.min(...sxs) + Math.max(...sxs)) / 2;
const cy0 = (Math.min(...sys) + Math.max(...sys)) / 2;
const txSN = a + d;

const LOGO_HEIGHT_FRACTION = 0.20; // logo cao ~20% chiều cao khung hình (thay vì to gần 60% như trước)
const K = (H * LOGO_HEIGHT_FRACTION) / bboxH;
const OX = (W - bboxW * K) / 2 - bboxMinX * K;
const OY = (H - bboxH * K) / 2 - bboxMinY * K;
const fitFn = p => ({ x: OX + p.x * K, y: OY + p.y * K });
const D_SCALED = d * K; // bề dày thanh = d, cùng tỉ lệ với logo cuối

const finalPathS1 = serializePath(transformCommands(cmds1, fitFn));
const finalPathS2 = serializePath(transformCommands(cmds2, fitFn));
const finalPathN1 = serializePath(transformCommands(cmdsN1, fitFn));
const finalPathN2 = serializePath(transformCommands(cmdsN2, fitFn));

// Điểm neo hội tụ: lấy mẫu 4 điểm + góc tiếp tuyến trên path thật của chữ S/N
// =============================================
function sampleAnchors(pathEl, count) {
  const total = pathEl.getTotalLength();
  const out = [];
  for (let i = 0; i < count; i++) {
    const t = (i + 0.5) / count;
    const len = t * total;
    const p = pathEl.getPointAtLength(len);
    const eps = Math.max(1, total * 0.004);
    const p1 = pathEl.getPointAtLength(Math.max(0, len - eps));
    const p2 = pathEl.getPointAtLength(Math.min(total, len + eps));
    const angle = Math.atan2(p2.y - p1.y, p2.x - p1.x) * 180 / Math.PI;
    out.push({ x: p.x, y: p.y, angle });
  }
  return out;
}

    onComplete: () => sp.remove()
  });
}

  const sparkBias = b.dir === 'left' ? 0 : 180; // tia lửa bắn ngược hướng que đang chạy tới

  tl.to(state, {
    len: BAR_LEN, duration: growDur, ease: 'power2.out',
    onUpdate: () => {
      const w = state.len;
      if (b.dir === 'left') {
        b.rect.setAttribute('x', rightX - w);
      }
      b.rect.setAttribute('width', w);
      const tipX = b.dir === 'left' ? rightX - w : leftX + w;
      const tipY = b.y + D_SCALED / 2;
      const now = tl.time();
      if (now - lastSpark > 0.028 && w > 4 && w < BAR_LEN - 4) {
        lastSpark = now;
        spawnSparkBurst(tipX, tipY, b.color, sparkBias);
      }
    }
  }, startAt);
});

tl.addLabel('grown', 2.9);

// "THANK YOU" biến mất ngay trước khi các thanh vỡ thành mảnh, nhường chỗ cho mảnh vỡ xoay/xếp hình
tl.to(thankYouLayer, { opacity: 0, duration: 0.45, ease: 'power1.in' }, 'grown-=0.55');

// --- Giai đoạn 2: vỡ thành nhiều đoạn / thanh (hoán đổi rect nguyên -> các mảnh, giật nhẹ) ---
// Dùng tl.to/tl.set thật (không phải tween mồ côi trong tl.call) để luôn render đúng dù seek tĩnh
barDefs.forEach(b => {
  tl.to(b.rect, { opacity: 0, duration: 0.12 }, 'grown+=0.15');
  tl.set(b.fragments, { opacity: 1 }, 'grown+=0.15');
});

barDefs.forEach(b => {
  b.fragments.forEach((f, i) => {
    tl.to(f, {
      x: `+=${rand(-22, 22)}`, y: `+=${rand(-22, 22)}`, rotation: rand(-25, 25),
      duration: 0.28, ease: 'back.out(2)'
    }, `grown+=${0.2 + i * 0.02}`);
  });
});

tl.addLabel('tumble', 'grown+=0.95');

// --- Giai đoạn 3: các mảnh quay ngẫu nhiên khắp màn hình ---
barDefs.forEach(b => {
  b.fragments.forEach((f, i) => {
    const tx_ = rand(140, W - 140);
    const ty_ = rand(120, H - 120);
    const spin = randSign() * rand(420, 1080);
    const dur = rand(2.8, 4.6);
    tl.to(f, {
      x: tx_, y: ty_, rotation: `+=${spin}`,
      duration: dur, ease: 'sine.inOut'
    }, `tumble+=${rand(0, 0.6)}`);
  });
});

tl.addLabel('converge', 'tumble+=4.6');

// --- Giai đoạn 4: các mảnh hội tụ về đúng vị trí trên nét chữ S/N ---
barDefs.forEach(b => {
  const anchors = anchorsMap[b.key];
  b.fragments.forEach((f, i) => {
    const t = anchors[i];
    tl.to(f, {
      x: t.x, y: t.y, rotation: t.angle,
      duration: 1.35, ease: 'power3.inOut'
    }, `converge+=${i * 0.02}`);
  });
});

tl.addLabel('flashPeak', 'converge+=1.5');

// --- Chớp sáng loé + hoán đổi mảnh vỡ -> logo vector chính xác ---
tl.to(flash, { opacity: 1, duration: 0.16, ease: 'power1.in' }, 'flashPeak');
tl.call(() => {
  fragmentsLayer.setAttribute('opacity', 0);
  finalLayer.setAttribute('opacity', 1);
}, [], 'flashPeak+=0.14');
tl.to(flash, { opacity: 0, duration: 0.4, ease: 'power1.out' }, 'flashPeak+=0.18');

// Không còn bước "bung/dịch vào giữa" riêng nữa — mảnh vỡ hội tụ thẳng vào đúng vị trí logo đã
// canh giữa sẵn (anchorsMap lấy từ finalLayer), chớp sáng xong là logo hiện nguyên vẹn tại chỗ,
// giữ mạch cảm xúc liền lạc thay vì thêm một nhịp "settle" tách biệt.
tl.addLabel('reveal', 'flashPeak+=0.75');

// =============================================
// Vòng tròn sáng lớn dần bao quanh logo -> đồng thời logo vector biến mất, thay bằng
// logo đầy đủ (ảnh gốc SONGNGOC CONSTRUCTION) -> vòng tròn DỪNG LẠI ở đó (không mở rộng
// choán hết màn hình) -> confetti thật (canvas-confetti) bắn ăn mừng
// =============================================
tl.addLabel('bloomIn', 'reveal+=0.5');
tl.to(bloomCore, { attr: { r: CORE_R }, duration: 1.3, ease: 'power2.in' }, 'bloomIn');
tl.to(bloomHalo, { attr: { r: HALO_R }, opacity: 0.98, duration: 1.3, ease: 'power2.in' }, 'bloomIn');
// logo vector biến mất, logo đầy đủ (ảnh gốc) hiện ra thay thế, ngay trong lúc vòng tròn đang lớn dần
tl.to(finalLayer, { opacity: 0, duration: 0.7, ease: 'power1.in' }, 'bloomIn+=0.25');
tl.to(pngLogo, { opacity: 1, duration: 0.85, ease: 'power1.out' }, 'bloomIn+=0.5');

tl.addLabel('badgeHold', 'bloomIn+=1.5'); // vòng tròn dừng hẳn ở đây, logo đầy đủ hiện rõ

// --- Confetti thật từ canvas-confetti, bắn ăn mừng khi logo đầy đủ đã ổn định ---
// resize:false — canvas giữ cố định 1920x1080, scale cùng #stage qua CSS transform nên luôn khớp toạ độ
const myConfetti = confetti.create(document.getElementById('confettiCanvas'), { resize: false, useWorker: true });
function startConfettiCelebration() {
  const confettiColors = [COLOR1, COLOR2, '#ffffff', '#ffd23f'];
  myConfetti({ particleCount: 150, spread: 105, startVelocity: 48, origin: { x: 0.5, y: 0.35 }, colors: confettiColors });
  const endAt = Date.now() + 6000;
  (function cannon() {
    myConfetti({ particleCount: 5, angle: 60, spread: 55, startVelocity: 50, origin: { x: 0, y: 0.9 }, colors: confettiColors });
    myConfetti({ particleCount: 5, angle: 120, spread: 55, startVelocity: 50, origin: { x: 1, y: 0.9 }, colors: confettiColors });
    if (Date.now() < endAt) requestAnimationFrame(cannon);
  })();
}
tl.call(startConfettiCelebration, [], 'badgeHold+=0.3');

// --- Bầu trời sao lấp lánh xuất hiện song song với confetti, ở lại vĩnh viễn sau khi confetti dứt ---
tl.to(starsLayer, { opacity: 1, duration: 1.4 }, 'badgeHold+=0.3');
tl.to(sparkleLayer, { opacity: 1, duration: 1.4 }, 'badgeHold+=0.3');
tl.call(() => {
  stars.forEach(twinkleStar);
  sparkles.forEach(sp => {
    gsap.to(sp, {
      scale: rand(1.15, 1.4), duration: rand(1.1, 1.8),
      yoyo: true, repeat: -1, ease: 'sine.inOut', delay: rand(0, 1),
      transformOrigin: 'center'
    });
  });
}, [], 'badgeHold+=0.3');

tl.addLabel('hold', 'badgeHold+=0.8');
tl.to({}, { duration: 10 }, 'hold'); // giữ khung hình cuối 10 giây — vừa đủ cho video xuất ra

// =============================================
// Điều khiển phát / HUD
// =============================================
const totalDur = tl.duration();
document.getElementById('hudTime').textContent = `0.0s / ${totalDur.toFixed(1)}s`;
function updateHud() {
  document.getElementById('hudTime').textContent = `${tl.time().toFixed(1)}s / ${totalDur.toFixed(1)}s`;
  requestAnimationFrame(updateHud);
}
requestAnimationFrame(updateHud);

function playFromStart() {
  tl.progress(0).kill();
  location.reload();
}
document.getElementById('btnReplay').addEventListener('click', playFromStart);

// =============================================
// Chọn nhạc nền (tuỳ chọn) — sẽ được trộn vào video khi bấm "Xuất video"
// =============================================
const musicInput = document.getElementById('musicInput');
const btnMusic = document.getElementById('btnMusic');
let musicFile = null, musicEl = null;

btnMusic.addEventListener('click', () => musicInput.click());
musicInput.addEventListener('change', () => {
  const f = musicInput.files[0];
  if (!f) return;
  musicFile = f;
  if (musicEl) URL.revokeObjectURL(musicEl.src);
  musicEl = document.createElement('audio');
  musicEl.src = URL.createObjectURL(f);
  musicEl.preload = 'auto';
  btnMusic.textContent = '🎵 ' + (f.name.length > 20 ? f.name.slice(0, 18) + '…' : f.name);
  btnMusic.classList.add('active');
});

// =============================================
// Xuất video Full HD — KHÔNG quay màn hình/tab (nên không dính nút điều khiển, không bị mờ do
// cửa sổ nhỏ). Thay vào đó: mỗi khung hình vẽ lại SVG sống + canvas confetti lên 1 canvas riêng
// đúng 1920x1080 cố định, rồi ghi hình canvas đó bằng captureStream + MediaRecorder — tương tự
// kỹ thuật "vẽ lên canvas ẩn rồi captureStream" tham khảo từ A006.html.
// =============================================
const btnExport = document.getElementById('btnExport');
const exportStatus = document.getElementById('exportStatus');
const exportOverlay = document.getElementById('exportOverlay');
const exportCanvas = document.getElementById('exportCanvas');
const exportLabel = document.getElementById('exportLabel');
const exportCtx = exportCanvas.getContext('2d');
let isExporting = false;

function svgFrameDataURL() {
  const xml = new XMLSerializer().serializeToString(svg);
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(xml);
}

btnExport.addEventListener('click', async () => {
  if (isExporting) return;
  if (typeof MediaRecorder === 'undefined' || !exportCanvas.captureStream) {
    alert('Trình duyệt này chưa hỗ trợ xuất video. Hãy dùng Chrome hoặc Edge bản mới nhất.');
    return;
  }

  isExporting = true;
  btnExport.disabled = true;
  document.getElementById('btnReplay').disabled = true;
  exportStatus.textContent = 'Đang ghi hình…';
  exportOverlay.classList.add('active');
  exportLabel.textContent = `Đang ghi hình… 0 / ${tl.duration().toFixed(0)}s`;

  // Dọn tàn dư còn sót (tia lửa, confetti cũ) trước khi phát lại từ đầu để quay
  sparksLayer.innerHTML = '';
  if (typeof myConfetti.reset === 'function') myConfetti.reset();

  const canvasStream = exportCanvas.captureStream(0); // 0 = tự đẩy khung hình thủ công (requestFrame)
  const videoTrack = canvasStream.getVideoTracks()[0];

  let combinedStream = canvasStream;
  let audioCtx = null;
  if (musicEl) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const sourceNode = audioCtx.createMediaElementSource(musicEl);
    const destNode = audioCtx.createMediaStreamDestination();
    sourceNode.connect(destNode);
    sourceNode.connect(audioCtx.destination); // để nghe được nhạc trong lúc quay
    combinedStream = new MediaStream([videoTrack, ...destNode.stream.getAudioTracks()]);
  }

  const mimeCandidates = [
    'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
    'video/mp4',
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp9',
    'video/webm'
  ];
  const mimeType = mimeCandidates.find(m => { try { return MediaRecorder.isTypeSupported(m); } catch (e) { return false; } }) || '';
  const ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';
  const recorder = new MediaRecorder(combinedStream, {
    ...(mimeType ? { mimeType } : {}),
    videoBitsPerSecond: 16_000_000 // ~16 Mbps — nét cho Full HD
  });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };

  let stopRequested = false;
  function finishExport() {
    stopRequested = true;
    if (recorder.state !== 'inactive') recorder.stop();
  }

  recorder.onstop = () => {
    if (musicEl) musicEl.pause();
    if (audioCtx) audioCtx.close();
    const blob = new Blob(chunks, { type: mimeType || 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `SongNgoc-SN-intro.${ext}`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 6000);
    exportOverlay.classList.remove('active');
    exportStatus.textContent = 'Đã xuất xong!';
    btnExport.disabled = false;
    document.getElementById('btnReplay').disabled = false;
    isExporting = false;
    setTimeout(() => { exportStatus.textContent = ''; }, 5000);
  };

  // --- Vòng lặp vẽ khung hình: rasterize SVG sống + canvas confetti lên exportCanvas ---
  const frameImg = new Image();
  let drawing = false;
  const t0 = performance.now();
  function scheduleDraw() {
    if (stopRequested || drawing) return;
    drawing = true;
    frameImg.onload = () => {
      exportCtx.fillStyle = BG;
      exportCtx.fillRect(0, 0, W, H);
      exportCtx.drawImage(frameImg, 0, 0, W, H);
      exportCtx.drawImage(document.getElementById('confettiCanvas'), 0, 0, W, H);
      videoTrack.requestFrame();
      exportLabel.textContent = `Đang ghi hình… ${((performance.now() - t0) / 1000).toFixed(0)} / ${tl.duration().toFixed(0)}s`;
      drawing = false;
      if (!stopRequested) requestAnimationFrame(scheduleDraw);
    };
    frameImg.onerror = () => { drawing = false; if (!stopRequested) requestAnimationFrame(scheduleDraw); };
    frameImg.src = svgFrameDataURL();
  }

  recorder.start(200);
  if (musicEl) { musicEl.currentTime = 0; musicEl.play().catch(() => {}); }
  tl.restart();
  scheduleDraw();

  setTimeout(finishExport, tl.duration() * 1000 + 400);
});

// Debug: mở với ?t=12.3 để "seek" tĩnh tới đúng giây đó (dùng khi chụp/preview từng khung hình).
// Lưu ý: tia lửa/nhấp nháy đầu que hàn dùng tween độc lập ngoài timeline (chạy theo đồng hồ
// thực), nên khi seek tĩnh chúng có thể kẹt giữa chừng — chỉ ảnh hưởng preview, không ảnh
// hưởng khi phát thật (tl.play).
const debugT = new URLSearchParams(location.search).get('t');
if (debugT !== null) {
  tl.seek(parseFloat(debugT), false);
} else {
  tl.play(0);
}

// --- Scale khung 1920x1080 vừa viewport ---
function fitStage() {
  const stage = document.getElementById('stage');
  const k = Math.min(window.innerWidth / W, window.innerHeight / H);
  stage.style.transform = `scale(${k})`;
}
window.addEventListener('resize', fitStage);
fitStage();
</script>
